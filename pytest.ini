[pytest]
testpaths = tests
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow
    integration: marks tests requiring real DB
    smoke: marks smoke tests (quick happy-path checks)
filterwarnings =
    ignore::DeprecationWarning

# Coverage gate.
#
# Default invocation:
#   venv/Scripts/python -m pytest --cov=app/camera_traps --cov=app/pam \
#                                 --cov-fail-under=30 --cov-report=term
#
# Baseline (2026-05-20): 35% TOTAL. Поріг 30% — захист від регресій;
# піднімаємо поступово (50% → 60%) у міру додавання нових тестів.
