# babel.cfg
#
# ⚠️ Keywords MUST be passed via CLI, not here. Putting `_l` in `keywords =`
# triggers a pybabel bug where `_l('...')` calls in .py files are silently
# skipped (templates still work). Тому використовуй:
#
#     pybabel extract -F babel.cfg -k _l -k lazy_gettext -o messages.pot .
#
# Default `_` (gettext) is built-in to pybabel.
#
# Субмодулі з власним доменом — виключені повністю (Python і шаблони):
#   app/pam/         → domain 'pam'          (app/pam/translations/)
#   app/camera_traps → domain 'camera_traps' (app/camera_traps/translations/)
#   app/sdm          → domain 'sdm'          (app/sdm/translations/)

# Python-файли в корені проекту
[python: *.py]

# Python-файли основного застосунку (субмодулі виключені)
[python: app/__init__.py]
[python: app/admin/**.py]
[python: app/models/**.py]
[python: app/routes/**.py]
[python: app/utils/**.py]

# Jinja2-шаблони основного застосунку (субмодульні шаблони виключені)
[jinja2: app/templates/**.html]
extensions = jinja2.ext.i18n,jinja2.ext.do
